name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev --extras service

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run basedpyright
        run: poetry run basedpyright

  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install .

      - name: Run CLI help
        run: gerber_to_scad --help

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OpenSCAD
        run: sudo apt-get install -y openscad xvfb

      - name: Install package
        run: pip install .

      - name: Generate STL from two files
        run: xvfb-run gerber_to_scad from-files tests/test_board-outline.gko tests/test_board-toppaste.gtp output.stl

      - name: Generate STL from zip
        run: xvfb-run gerber_to_scad from-zip tests/test_board.zip output_zip.stl --side top

  release-testpypi:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, install, test]
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['poetry']['version'])")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://test.pypi.org/pypi/gerber-to-scad/$VERSION/json)
          [ "$STATUS" = "200" ] && echo "should_publish=false" >> $GITHUB_OUTPUT || echo "should_publish=true" >> $GITHUB_OUTPUT

      - name: Build package
        if: steps.check.outputs.should_publish == 'true'
        run: pip install build && python -m build

      - name: Publish to TestPyPI
        if: steps.check.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [lint, install, test]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['poetry']['version'])")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/gerber-to-scad/$VERSION/json)
          [ "$STATUS" = "200" ] && echo "should_publish=false" >> $GITHUB_OUTPUT || echo "should_publish=true" >> $GITHUB_OUTPUT

      - name: Build package
        if: steps.check.outputs.should_publish == 'true'
        run: pip install build && python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
